<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>


.award-billboard.visible{opacity:1;transform:translateY(0);}

/* IMMERSIVE ENGINEERING LAYER */
html{scroll-snap-type:y proximity;}
body{background:linear-gradient(150deg,#EDF5FF 0%,#F7F1FA 48%,#E8F6F1 100%);}
html{scroll-snap-type:none;}
body{background:linear-gradient(150deg,#F5F9FF 0%,#F9FBFF 48%,#EEF7F4 100%);cursor:auto;}
body::before{
  content:'';position:fixed;inset:0;z-index:-4;pointer-events:none;
  background:
    radial-gradient(circle at var(--mx,50%) var(--my,30%),rgba(214,59,128,.18),transparent 28vw),
    radial-gradient(circle at calc(100% - var(--mx,50%)) 76%,rgba(18,81,170,.16),transparent 32vw),
    radial-gradient(circle at 18% 82%,rgba(39,174,95,.13),transparent 24vw);
    linear-gradient(115deg,rgba(18,81,170,.055),transparent 28%),
    linear-gradient(245deg,rgba(214,59,128,.045),transparent 34%),
    radial-gradient(circle at 18% 82%,rgba(39,174,95,.07),transparent 24vw);
  filter:saturate(1.2);animation:meshDrift 18s ease-in-out infinite alternate;
}
@keyframes meshDrift{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.08) rotate(1.5deg)}}
.site-grain{position:fixed;inset:-20%;z-index:1000;pointer-events:none;opacity:.09;mix-blend-mode:multiply;background-image:radial-gradient(circle,rgba(8,21,42,.55) 0 1px,transparent 1px);background-size:4px 4px;animation:grainShift .8s steps(2,end) infinite;}
.site-grain{position:fixed;inset:-20%;z-index:-1;pointer-events:none;opacity:.018;mix-blend-mode:multiply;background-image:radial-gradient(circle,rgba(8,21,42,.45) 0 1px,transparent 1px);background-size:5px 5px;animation:grainShift 1.4s steps(2,end) infinite;}
@keyframes grainShift{0%{transform:translate(0,0)}25%{transform:translate(-3%,2%)}50%{transform:translate(2%,-4%)}75%{transform:translate(4%,3%)}100%{transform:translate(-2%,-1%)}}
.engineering-grid{position:fixed;inset:0;z-index:-3;pointer-events:none;opacity:.45;background-image:linear-gradient(rgba(18,81,170,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(18,81,170,.09) 1px,transparent 1px),radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(214,59,128,.24),transparent 18rem);background-size:42px 42px,42px 42px,100% 100%;mask-image:linear-gradient(to bottom,black,transparent 92%);}
.engineering-grid{position:fixed;inset:0;z-index:-3;pointer-events:none;opacity:.22;background-image:linear-gradient(rgba(18,81,170,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(18,81,170,.055) 1px,transparent 1px),linear-gradient(135deg,transparent 48%,rgba(214,59,128,.08) 49%,rgba(214,59,128,.08) 50%,transparent 51%);background-size:56px 56px,56px 56px,180px 180px;mask-image:linear-gradient(to bottom,black,transparent 88%);}
.progress-spine{position:fixed;left:22px;top:96px;bottom:26px;z-index:230;width:3px;background:rgba(18,81,170,.12);border-radius:99px;display:flex;align-items:flex-start;}
.progress-spine__fill{width:100%;height:0;background:linear-gradient(to bottom,var(--pink),#27AE60,var(--accent));border-radius:inherit;box-shadow:0 0 18px rgba(214,59,128,.28);}
.progress-dots{position:fixed;left:13px;top:96px;bottom:26px;z-index:231;display:flex;flex-direction:column;justify-content:space-between;}
.progress-dots a{width:21px;height:21px;border-radius:50%;border:2px solid rgba(18,81,170,.22);background:rgba(255,255,255,.65);backdrop-filter:blur(12px);box-shadow:0 8px 20px rgba(18,81,170,.08);transition:transform .22s,border-color .22s,background .22s;}
.progress-dots a.active{transform:scale(1.2);border-color:var(--pink);background:var(--pink);}
.morph-field{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden;}
.morph-field svg{position:absolute;width:min(46vw,560px);height:auto;opacity:.18;filter:blur(.2px);}
.morph-field svg:first-child{left:-10vw;top:18vh;animation:morphFloat 12s ease-in-out infinite alternate;}
.morph-field svg:last-child{right:-14vw;bottom:4vh;animation:morphFloat 16s ease-in-out infinite alternate-reverse;}
.morph-field{display:none;}
.morph-field svg{display:none;}
.morph-field svg:first-child{display:none;}
.morph-field svg:last-child{display:none;}
@keyframes morphFloat{0%{transform:translate3d(0,0,0) rotate(0deg) scale(.95);border-radius:39% 61% 57% 43%}100%{transform:translate3d(3vw,-4vh,0) rotate(8deg) scale(1.05);border-radius:61% 39% 42% 58%}}
nav,.hero-photo-card,.hero-photo-badge,.stat-chip,.project-card,.edu-card,.about-photo-card,.timeline-item>div:last-child,.award-row,.writing-card,.contact-info,.contact-form,.social-link{
  background:rgba(255,255,255,.68);border-color:rgba(255,255,255,.42);backdrop-filter:blur(22px) saturate(1.25);-webkit-backdrop-filter:blur(22px) saturate(1.25);
  background:rgba(255,255,255,.86);border-color:rgba(18,81,170,.12);backdrop-filter:blur(16px) saturate(1.08);-webkit-backdrop-filter:blur(16px) saturate(1.08);
}
h1,h2,.big-scroll-word{letter-spacing:0;}
.section-wrap{position:relative;scroll-snap-align:start;}
}
.project-card:hover::after,.writing-card:hover::after,.award-row:hover::after,.award-billboard:hover::after,.social-link:hover::after{opacity:1;}
.magnetic{will-change:transform;}
.cursor-ring[data-cursor-label]::after{content:attr(data-cursor-label);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:var(--font-mono);font-size:9px;color:var(--pink);letter-spacing:0;text-transform:uppercase;white-space:nowrap;}
.cursor-ring.engineering{width:78px;height:78px;border-style:dashed;animation:cursorSpin 1.8s linear infinite;}
.cursor,.cursor-ring{display:none;}
.cursor-ring[data-cursor-label]::after{content:'';}
.cursor-ring.engineering{display:none;}
@keyframes cursorSpin{to{transform:rotate(360deg)}}
.text-reveal .word{display:inline-block;opacity:0;transform:translateY(18px) rotateX(38deg);transform-origin:50% 100%;transition:opacity .55s ease,transform .65s cubic-bezier(.22,1,.36,1);transition-delay:calc(var(--d,0) * 42ms);}
.text-reveal.visible .word{opacity:1;transform:translateY(0) rotateX(0deg);}
.spark-node{position:fixed;width:9px;height:9px;border-radius:50%;background:var(--pink);box-shadow:0 0 18px rgba(214,59,128,.8);pointer-events:none;z-index:9997;animation:sparkFly .8s ease-out forwards;}
@keyframes sparkFly{to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}}

/* PROFESSIONAL READABILITY PASS */
#hero{
  min-height:auto;
  padding:132px 0 86px;
  align-items:flex-start;
  overflow:visible;
  background:linear-gradient(145deg,#F7FAFF 0%,#EEF5FF 52%,#F7F3F8 100%);
}
.hero-inner{align-items:start;}
h1{
  max-width:820px;
  font-size:clamp(52px,6vw,86px);
  line-height:1.08;
  text-wrap:balance;
}
.hero-sub{
  color:#2D4563;
  font-size:clamp(17px,1.55vw,20px);
  line-height:1.72;
  max-width:650px;
  background:rgba(255,255,255,.74);
  border:1px solid rgba(18,81,170,.1);
  border-radius:8px;
  padding:18px 20px;
  box-shadow:0 14px 34px rgba(18,81,170,.06);
}
.btn-primary,.btn-ghost,.nav-cta,.hero-available,.skill-tag,.project-tag,.school-chip,.featured-badge,.award-billboard-year,.progress-dots a{
  border-radius:8px;
}
.skill-tag,.project-tag,.school-chip{
  background:rgba(255,255,255,.84);
  border:1px solid rgba(18,81,170,.18);
  color:#0E4F9F;
  box-shadow:0 8px 22px rgba(18,81,170,.05);
}
.skill-tag.pro{
  background:rgba(214,59,128,.08);
  border-color:rgba(214,59,128,.28);
  color:#B02060;
}
.project-card,.edu-card,.about-photo-card,.hero-photo-card,.contact-form,.writing-card,.award-billboard,.timeline-item>div:last-child{
  border-radius:8px;

</style>

</head>

</html>
